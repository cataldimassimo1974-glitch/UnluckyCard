<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Game</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
            margin: 0;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-gap: 10px;
        }
        .card {
            width: 100px;
            height: 150px;
            background-color: white;
            border: 1px solid #ccc;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .card:hover {
            transform: scale(1.05);
        }
        .suit {
            font-size: 60px;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="grid">
        <div class="card"><span class="suit">♥</span></div>
        <div class="card"><span class="suit">♦</span></div>
        <div class="card"><span class="suit">♣</span></div>
        <div class="card"><span class="suit">♠</span></div>
        <div class="card"><span class="suit">♥</span></div>
        <div class="card"><span class="suit">♦</span></div>
        <div class="card"><span class="suit">♣</span></div>
        <div class="card"><span class="suit">♠</span></div>
        <div class="card"><span class="suit">♥</span></div>
    </div>
    <script>
        const cards = document.querySelectorAll('.card');
        cards.forEach(card => {
            card.addEventListener('click', () => {
                alert('Card clicked!');
            });
        });
    </script>
</body>
</html>
