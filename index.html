<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pick Your Fate - Elite</title>
    <style>
        :root {
            --bg: #020617;
            --accent: #f43f5e;
            --card-back: #1e293b;
            --card-front: #ffffff;
            --joker-color: #7c3aed; /* Viola per il Joker */
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Georgia', serif;
            background-color: var(--bg);
            color: white;
            margin: 0;
            padding: env(safe-area-inset-top) 15px env(safe-area-inset-bottom);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            font-size: 1.8rem;
            margin: 40px 0 10px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: var(--accent);
            text-shadow: 0 0 20px rgba(244, 63, 94, 0.3);
        }

        #p_display { color: #64748b; margin-bottom: 30px; font-style: italic; }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 450px;
        }

        .card {
            aspect-ratio: 2 / 3;
            background-color: var(--card-back);
            border: 1px solid rgba(244, 63, 94, 0.4);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .card .roman-num {
            font-size: 1.5rem;
            color: #475569;
            font-weight: lighter;
        }

        .card .rule-text {
            display: none;
            padding: 12px;
            font-size: 0.8rem;
            font-weight: bold;
            color: var(--bg);
            text-align: center;
            line-height: 1.3;
        }

        /* Carta Rivelata */
        .card.revealed {
            background-color: var(--card-front);
            transform: scale(1.1) rotateZ(1deg);
            z-index: 10;
            box-shadow: 0 0 30px rgba(255,255,255,0.2);
        }

        .card.joker-reveal {
            background-color: var(--joker-color) !important;
            color: white !important;
            border-color: white;
        }

        .card.revealed .roman-num { display: none; }
        .card.revealed .rule-text { display: block; }

        .card.dimmed { opacity: 0.15; filter: blur(2px); pointer-events: none; }

        #reset-btn {
            margin-top: 40px;
            background: none;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 12px 40px;
            border-radius: 4px;
            font-weight: bold;
            display: none;
            cursor: pointer;
            letter-spacing: 2px;
        }

        /* ADMIN PANEL */
        #admin {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #f8fafc; color: #0f172a;
            display: none; padding: 25px; z-index: 1000; overflow-y: auto;
        }
        .force-box {
            background: #fee2e2; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 2px dashed #ef4444;
        }
    </style>
</head>
<body>

    <h1 id="title">DRAW NOW</h1>
    <p id="p_display">Fate is not a matter of chance...</p>

    <div class="grid" id="board"></div>

    <button id="reset-btn" onclick="initBoard()">RETRY YOUR LUCK</button>

    <div id="admin">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2>Master Control</h2>
            <button onclick="document.getElementById('admin').style.display='none'">CLOSE</button>
        </div>

        <div class="force-box">
            <h3>FORCE NEXT CARD</h3>
            <p><small>Whatever they pick next, this text will appear.</small></p>
            <input type="text" id="force-input" style="width:100%; padding:10px; margin-bottom:10px;" placeholder="Enter forced rule...">
            <button onclick="setForcedCard()" style="background:#ef4444; color:white; border:none; padding:10px; width:100%; font-weight:bold;">SET FORCED CARD</button>
            <p id="force-status" style="font-size:0.7rem; color:red; margin-top:5px;"></p>
        </div>

        <h3>Active Rules Pool</h3>
        <div id="list"></div>
    </div>

    <script>
        const STORAGE_KEY = 'grid_cards_force_v1';
        const ROMANS = ["I", "II", "III", "IV", "V", "VI", "VII", "VIII", "IX"];
        
        const defaultRules = [
            "LUXURY TAX: Next 30 mins, every request requires an extra tip or it will be ignored.",
            "VIP ENTRANCE: Your attention time is over. Pay now to keep chatting for 10 more mins.",
            "GASLIGHT: That last payment 'failed'. Pay the full balance again to unlock content.",
            "OFFER: All tips and costs are now +50% for the rest of the day.",
            "SELECTIVE HEARING: I will do the exact opposite of what you ask for the next 3 requests.",
            "SILENT TREATMENT: I'm bored. For 5 minutes, I only reply with emojis or silence.",
            "OUTFIT TEASE: I'll change, but it will be even more covered up than before. Pay to see.",
            "BLURRY VISION: Next photo will be intentionally blurry. Pay for 'HD Focus' to see it.",
            "CLOCK IS TICKING: Session speed cut by 50%. Buy 'Time Boost' to restore."
        ];

        let rules = JSON.parse(localStorage.getItem(STORAGE_KEY)) || defaultRules;
        let forcedText = localStorage.getItem('forced_card_text') || null;

        function initBoard() {
            const board = document.getElementById('board');
            const resetBtn = document.getElementById('reset-btn');
            board.innerHTML = '';
            resetBtn.style.display = 'none';

            let shuffled = [...rules].sort(() => Math.random() - 0.5);

            ROMANS.forEach((num, i) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<div class="roman-num">${num}</div><div class="rule-text"></div>`;
                
                card.onclick = function() {
                    if (document.querySelector('.card.revealed')) return;

                    let finalRule = "";
                    let isJoker = false;

                    // Logica di scelta testo
                    if (forcedText) {
                        finalRule = "MASTER'S CHOICE: " + forcedText;
                        forcedText = null;
                        localStorage.removeItem('forced_card_text');
                        document.getElementById('force-status').innerText = "";
                    } else {
                        // 15% chance of Joker if not forced
                        if (Math.random() < 0.15) {
                            finalRule = "🃏 JOKER 🃏\nDouble the next payment or perform the next 2 rules combined!";
                            isJoker = true;
                        } else {
                            finalRule = shuffled[i % shuffled.length];
                        }
                    }

                    this.querySelector('.rule-text').innerText = finalRule;
                    this.classList.add('revealed');
                    if (isJoker) this.classList.add('joker-reveal');
                    
                    document.querySelectorAll('.card').forEach(c => {
                        if (c !== this) c.classList.add('dimmed');
                    });
                    
                    setTimeout(() => { resetBtn.style.display = 'block'; }, 1000);
                };

                board.appendChild(card);
            });
        }

        // Admin functions
        document.getElementById('title').onclick = (e) => { if (e.detail === 3) showAdmin(); };

        function showAdmin() {
            document.getElementById('admin').style.display = 'block';
            if (forcedText) document.getElementById('force-status').innerText = "CURRENTLY FORCED: " + forcedText;
            renderAdminList();
        }

        function setForcedCard() {
            const txt = document.getElementById('force-input').value.trim();
            if (txt) {
                forcedText = txt;
                localStorage.setItem('forced_card_text', txt);
                document.getElementById('force-status').innerText = "NEXT CARD IS FORCED!";
                document.getElementById('force-input').value = "";
            }
        }

        function renderAdminList() {
            const list = document.getElementById('list');
            list.innerHTML = rules.map((r, i) => `
                <div style="padding:10px; border-bottom:1px solid #ddd; display:flex; justify-content:space-between; font-size:0.7rem;">
                    <span>${r}</span>
                    <button onclick="deleteRule(${i})" style="color:red;">DEL</button>
                </div>
            `).join('');
        }

        window.deleteRule = (i) => {
            rules.splice(i, 1);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(rules));
            renderAdminList();
        };

        initBoard();
    </script>
</body>
</html>
