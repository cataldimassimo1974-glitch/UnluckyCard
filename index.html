<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Card Game</title>\n    <link rel="stylesheet" href="styles.css">\n</head>\n<body>\n    <div class="container">\n        <div class="card" data-card="1">\n            <div class="card-inner">\n                <div class="card-front">?</div>\n                <div class="card-back">Card 1</div>\n            </div>\n        </div>\n        <div class="card" data-card="2">\n            <div class="card-inner">\n                <div class="card-front">?</div>\n                <div class="card-back">Card 2</div>\n            </div>\n        </div>\n        <div class="card" data-card="3">\n            <div class="card-inner">\n                <div class="card-front">?</div>\n                <div class="card-back">Card 3</div>\n            </div>\n        </div>\n        <div class="card" data-card="4">\n            <div class="card-inner">\n                <div class="card-front">?</div>\n                <div class="card-back">Card 4</div>\n            </div>\n        </div>\n        <div class="card" data-card="5">\n            <div class="card-inner">\n                <div class="card-front">?</div>\n                <div class="card-back">Card 5</div>\n            </div>\n        </div>\n        <div class="card" data-card="6">\n            <div class="card-inner">\n                <div class="card-front">?</div>\n                <div class="card-back">Card 6</div>\n            </div>\n        </div>\n        <div class="card" data-card="7">\n            <div class="card-inner">\n                <div class="card-front">?</div>\n                <div class="card-back">Card 7</div>\n            </div>\n        </div>\n        <div class="card" data-card="8">\n            <div class="card-inner">\n                <div class="card-front">?</div>\n                <div class="card-back">Card 8</div>\n            </div>\n        </div>\n        <div class="card" data-card="9">\n            <div class="card-inner">\n                <div class="card-front">?</div>\n                <div class="card-back">Card 9</div>\n            </div>\n        </div>\n    </div>\n    <script src="script.js"></script>\n</body>\n</html>\n\n<style>\n    body {\n        display: flex;\n        justify-content: center;\n        align-items: center;\n        height: 100vh;\n        background-color: #f4f4f4;\n    }\n    .container {\n        display: grid;\n        grid-template-columns: repeat(3, 1fr);\n        gap: 10px;\n    }\n    .card {\n        width: 100px;\n        height: 150px;\n        perspective: 1000px;\n        cursor: pointer;\n    }\n    .card-inner {\n        position: relative;\n        width: 100%;\n        height: 100%;\n        transition: transform 0.6s;\n        transform-style: preserve-3d;\n    }\n    .card-front, .card-back {\n        position: absolute;\n        width: 100%;\n        height: 100%;\n        display: flex;\n        justify-content: center;\n        align-items: center;\n        font-size: 2em;\n        color: white;\n        backface-visibility: hidden;\n    }\n    .card-front {\n        background: #007bff;\n    }\n    .card-back {\n        background: #28a745;\n        transform: rotateY(180deg);\n    }\n    .card.flipped .card-inner {\n        transform: rotateY(180deg);\n    }\n</style>\n\n<script>\n    const cards = document.querySelectorAll('.card');\n    cards.forEach(card => {\n        card.addEventListener('click', () => {\n            card.classList.toggle('flipped');\n        });\n    });\n</script>
