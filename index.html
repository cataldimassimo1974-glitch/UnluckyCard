<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unlucky Card</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        .card {
            width: 100px;
            height: 150px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            background-color: white;
            border: 1px solid #ccc;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="grid">
        <div class="card" onclick="showAlert(0)">2♥</div>
        <div class="card" onclick="showAlert(1)">8♦</div>
        <div class="card" onclick="showAlert(2)">9♣</div>
        <div class="card" onclick="showAlert(3)">5♠</div>
        <div class="card" onclick="showAlert(4)">7♥</div>
        <div class="card" onclick="showAlert(5)">6♦</div>
        <div class="card" onclick="showAlert(6)">4♣</div>
        <div class="card" onclick="showAlert(7)">J♠</div>
        <div class="card" onclick="showAlert(8)">3♥</div>
    </div>
    <script>
        function showAlert(index) {
            const instructions = [
                "The Luxury Tax: For the next 30 minutes, every single request must be accompanied by an mandatory extra tip.",
                "The VIP Entrance Fee: The user need to pay an immediate payment just to keep chatting for the next 10 minutes.",
                "Gaslight Special: Pick a payment he made and insist it 'never arrived'. Demand the full balance and be angry for his try.",
                "Today's Special Offer! For the rest of the day, all payments and tips cost 50% more for the user.",
                "The Selective Hearing: For the next request, do the exact opposite of what the user asks. If he want serious be maniacally smiling, if a close up move far away.",
                "The Silent Treatment...: For the next 5 minutes, reply only with emojis or don't reply at all.",
                "The Outfit Tease. Agree to an outfit change, take payment, then change into something even more covered.",
                "Blurry Vision? The next photo/video that the user buy will be intentionally blurry or have a terrible frame rate. If he want it in high-def, he must pay for the 'Premium Focus' to fix it.",
                "The Clock is Ticking! Cut your response speed or session time by 50%, untill the user buy some extra time."
            ];
            alert(instructions[index]);
        }
    </script>
</body>
</html>
